# cargo-deny config — enforces MISSION.md §6 license-locked
# preservation and CRATE_RECOMMENDATIONS §1 license gate.

[graph]
all-features = true

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
    "OpenSSL",
    "AGPL-3.0",
    "AGPL-3.0-or-later",
    "GPL-3.0",
    "GPL-3.0-or-later",
    "CC0-1.0",
]
confidence-threshold = 0.85

[bans]
multiple-versions = "warn"
wildcards = "deny"

[advisories]
yanked = "warn"
# QA-harness findings v0.1.3 → ignore in v0.1.4. Both are
# unmaintained-track advisories pulled in transitively via
# ciris-keyring (CIRISVerify's TPM/keyring stack). Can't fix
# downstream from here. Track upstream for cleanup; the
# unmaintained code paths aren't on our hot path:
# - RUSTSEC-2024-0388 derivative — proc-macro for derive impls
#   (compile-time only, no runtime exposure)
# - RUSTSEC-2024-0384 instant — wall-clock helpers; Phase 2.3
#   Reticulum work may replace this branch entirely
ignore = [
    "RUSTSEC-2024-0388",  # derivative unmaintained
    "RUSTSEC-2024-0384",  # instant unmaintained
]

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-git = []
