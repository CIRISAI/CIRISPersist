# cargo-deny config — enforces MISSION.md §6 license-locked
# preservation and CRATE_RECOMMENDATIONS §1 license gate.

[graph]
all-features = true

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
    "OpenSSL",
    "AGPL-3.0",
    "AGPL-3.0-or-later",
    "GPL-3.0",
    "GPL-3.0-or-later",
    "CC0-1.0",
]
confidence-threshold = 0.85

[bans]
multiple-versions = "warn"
wildcards = "deny"

[advisories]
yanked = "warn"
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-git = []
