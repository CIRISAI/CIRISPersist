name: CI

on:
  push:
    branches: [main]
    # v0.1.12 — also fire on v-prefixed release tags. Without this,
    # tag pushes don't trigger CI at all and the publish-pypi job
    # (gated on `refs/tags/v*`) never runs even when the tag exists.
    tags: ['v*']
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # Mission category §4 (PLATFORM_ARCHITECTURE.md §4):
  # the linux-x86_64 path that runs the full feature set with a
  # real Postgres backing the integration tests.
  linux-x86_64-test:
    name: linux-x86_64 (full features)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: ciris
          POSTGRES_PASSWORD: ciris
          POSTGRES_DB: ciris_persist_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ciris"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (postgres + server + pyo3)
        env:
          CIRIS_PERSIST_TEST_PG_URL: postgres://ciris:ciris@localhost:5432/ciris_persist_test
        run: cargo test --features "postgres server pyo3" --all-targets
      - name: cargo test (default — fixture suite)
        run: cargo test --test wire_format_fixtures

  # NOTE: the prior `linux-aarch64-build` cross-compile job was removed
  # in v0.1.15. Its purpose ("prove the crate cross-compiles to arm64
  # from an x86_64 host") is fully subsumed by the native arm64 wheel
  # build on `ubuntu-24.04-arm` (see `pyo3-wheel` matrix), which has
  # been GA + free for public repos since 2025-01. The cross-compile
  # job had become pure churn — it required a fragile apt install of
  # gcc-aarch64-linux-gnu (Azure mirror flakiness) without producing a
  # consumable artifact.


  # Mission alignment: macOS dev path (PLATFORM_ARCHITECTURE.md §1).
  darwin-aarch64-test:
    name: darwin-aarch64 (no postgres)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (no postgres feature)
        run: cargo test --features server

  # Mission category §4 + PLATFORM_ARCHITECTURE.md §3.1: iOS device
  # build path. Runs on macOS with the iOS targets.
  ios-build:
    name: ios-aarch64 (device build)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim
      - uses: Swatinem/rust-cache@v2
      - name: cargo build (ios device)
        run: cargo build --target aarch64-apple-ios --no-default-features
      - name: cargo build (ios simulator)
        run: cargo build --target aarch64-apple-ios-sim --no-default-features

  # Mission category §4 "Mission rejection" + audit/lint.
  lint:
    name: clippy + fmt + audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets --features "postgres server pyo3" -- -D warnings

  # Mission category §4 "Mission rejection": the clippy + fmt gate
  # plus a license-deny pass per CRATE_RECOMMENDATIONS §6.
  license-audit:
    name: cargo deny (license + advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v2

  # Build the abi3-py311 wheel via maturin. Per
  # PLATFORM_ARCHITECTURE.md §3.5: one wheel per (os, arch) pair.
  #
  # v0.1.13 — matrix build covering the agent's full PyPI surface:
  #   linux x86_64, linux aarch64, darwin arm64, darwin x86_64.
  # iOS / Android don't ship via PyPI (xcframework / UniFFI native
  # packaging) so they're out of scope here; Phase 1 spec.
  #
  # Each matrix entry runs on a NATIVE runner for that target so we
  # avoid cross-compile drama (sysroot, linkers, vendored openssl
  # quirks). GitHub Actions Linux ARM64 runners
  # (`ubuntu-24.04-arm`) have been GA + free for public repos
  # since 2025-01.
  pyo3-wheel:
    name: maturin abi3-py311 wheel (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    label: linux-x86_64,   tag: manylinux_2_34_x86_64 }
          - { os: ubuntu-24.04-arm, label: linux-aarch64,  tag: manylinux_2_34_aarch64 }
          - { os: macos-14,         label: darwin-aarch64, tag: macosx_11_0_arm64 }
          # darwin-x86_64 (macos-13) intentionally omitted — GitHub
          # Actions Intel macOS runners have ongoing capacity issues
          # (jobs queue indefinitely). CIRISAgent's matrix dropped it
          # for the same reason; their build.yml explicitly notes
          # "macOS Intel: built and uploaded manually (GitHub runner
          # capacity issues)". Persist's
          # FSD/PLATFORM_ARCHITECTURE.md §3.5 already classifies
          # darwin-x86_64 as "sunset target — keep CI green only";
          # publishing a wheel for it is nice-to-have, not load-
          # bearing for the lens cutover. Add back via manual upload
          # if a real consumer materializes.
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install maturin
        run: pip install maturin
      - name: maturin build
        run: maturin build --release --strip
      - name: confirm wheel shape
        # Reject anything that isn't cp311-abi3 — the v0.1.10 regression
        # showed mixed-mode maturin can silently emit cp31N-cp31N
        # wheels which break consumer install on other minors. Catching
        # at build time, before the wheel reaches PyPI.
        run: |
          ls -la target/wheels/
          if ! ls target/wheels/*-cp311-abi3-*.whl >/dev/null 2>&1; then
            echo "::error::Expected cp311-abi3 wheel for ${{ matrix.label }}; got:"
            ls target/wheels/*.whl 2>/dev/null || echo "  (no wheels)"
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ciris_persist-wheel-${{ matrix.label }}
          path: target/wheels/*.whl

  # v0.1.12 — publish abi3 wheel to PyPI on every tag push.
  #
  # Lens (and any future Python consumer) currently rebuilds persist
  # from source on every cold cache because there's no PyPI artifact
  # — that's ~75min of Rust compile per cold build, dominated by the
  # ciris-keyring + ciris-verify-core + tokio-postgres + ed25519
  # graph. With this job, lens collapses to
  # `pip install ciris-persist==<version>` (~10s).
  #
  # Trust posture: the BuildManifest round-trip
  # (build-manifest job above) is the cryptographic root of trust.
  # PyPI is just a fast distribution channel — peers verifying
  # authenticity check the registry-side hybrid Ed25519 + ML-DSA-65
  # signature on the manifest, not the PyPI artifact itself. PEP 740
  # attestations (enabled below) compound the two: sigstore-attested
  # PyPI upload that ties the wheel to the GitHub Actions identity
  # that produced it.
  #
  # Auth: OIDC trusted publishing. NO API token in CI secrets — PyPI
  # validates the workflow's GitHub identity directly. One-time setup
  # on PyPI side is required (project owner reserves the name +
  # configures the trusted publisher to allow this exact repo +
  # workflow + environment); see docs/PYPI_PUBLISH.md.
  publish-pypi:
    name: Publish wheel to PyPI (tag-gated)
    runs-on: ubuntu-latest
    needs: [pyo3-wheel, build-manifest]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/project/ciris-persist/
    permissions:
      # OIDC token-issuance permission. Required for PyPI's trusted
      # publishing. Scope is the workflow's GitHub-issued JWT only;
      # no long-lived secret.
      id-token: write
    steps:
      - name: download all multi-arch wheels
        # v0.1.13 — pull every wheel the matrix produced into one
        # dist/ dir for the upload action. `merge-multiple: true`
        # flattens the per-artifact subdirs since the .whl
        # filenames already encode the target tag (e.g.
        # `-manylinux_2_34_aarch64`) so there's no collision.
        uses: actions/download-artifact@v4
        with:
          pattern: ciris_persist-wheel-*
          merge-multiple: true
          path: dist
      - name: sanity-check wheel shapes before publish
        # Reject anything that isn't cp311-abi3 — the v0.1.10
        # regression showed mixed-mode maturin can silently emit
        # cp31N-cp31N wheels which break consumer install. Catch
        # at publish time too (also caught at build time per
        # matrix entry).
        run: |
          ls -la dist/
          COUNT=$(ls dist/*.whl 2>/dev/null | wc -l)
          if [ "${COUNT}" -lt 3 ]; then
            echo "::error::Expected 3 wheels (linux x86_64 + aarch64, darwin arm64); got ${COUNT}"
            ls dist/*.whl 2>/dev/null || echo "  (no .whl files at all)"
            exit 1
          fi
          for wheel in dist/*.whl; do
            if ! [[ "${wheel}" =~ -cp311-abi3- ]]; then
              echo "::error::Non-abi3 wheel detected: ${wheel}"
              exit 1
            fi
            echo "✓ ${wheel}"
          done
          echo "✓ All ${COUNT} wheels conform to cp311-abi3."
      - name: publish to PyPI via OIDC trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # No `password:` — OIDC trusted publishing handles auth.
          packages-dir: dist
          # skip-existing protects against accidental re-publish on
          # tag re-runs. PyPI rejects same-version re-uploads anyway,
          # but failing softly here keeps re-runs idempotent.
          skip-existing: true
          # PEP 740 — sigstore-attested upload. Compounds with the
          # BuildManifest hybrid signature already in place. Free
          # provenance bonus; consumers verifying the manifest can
          # also verify the PyPI artifact ties to this exact GH
          # workflow identity.
          attestations: true

  # Build manifest registration scaffold (v0.1.3+). Generates a
  # file-tree manifest of the source tree, Ed25519-signs it via
  # ciris-keyring-shaped CIRIS_BUILD_SIGN_KEY (32-byte seed in
  # base64), uploads as an artifact. The `register` step that
  # would push to CIRISRegistry is intentionally NOT here — the
  # registry doesn't yet accept project="ciris-persist". See
  # docs/TODO_REGISTRY.md and the CIRISAgent tracking issue for
  # the cross-repo refactor that lands `tools/ciris_manifest.py`
  # as a shared tool.
  build-manifest:
    name: Generate + sign build manifest (v1.8.0 hybrid Ed25519 + ML-DSA-65)
    runs-on: ubuntu-latest
    needs: pyo3-wheel
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | cut -d'"' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "ciris-persist version: $VERSION"
      - name: install ciris-build-sign (prebuilt from CIRISVerify release)
        # v0.1.15+ — was `cargo install --git ... ciris-build-tool`
        # which recompiled the entire upstream signing crate + dep
        # tree (~5min) and required libtss2-dev for the
        # ciris-keyring link path. Switched to the prebuilt tarball
        # from CIRISVerify v1.8.0 release assets — same v1.8.0 git
        # tag we depend on, so the BuildManifest shape exactly
        # matches what our PersistExtrasValidator expects.
        #
        # Sigstore signature + .pem cert are downloaded but not yet
        # verified (cosign verification is a v0.1.16 follow-up;
        # tracked under task #81). The release-asset URL itself is
        # the trust boundary today: GitHub-hosted, served over TLS
        # against CIRISAI/CIRISVerify, no third-party mirror.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd "$RUNNER_TEMP"
          gh release download v1.8.0 --repo CIRISAI/CIRISVerify \
            --pattern 'ciris-verify-v1.8.0-build-tool-linux-x86_64.tar.gz'
          tar -xzf ciris-verify-v1.8.0-build-tool-linux-x86_64.tar.gz
          # Tarball layout: build-tool/{ciris-build-sign,ciris-build-verify}
          sudo install -m755 build-tool/ciris-build-sign /usr/local/bin/ciris-build-sign
          sudo install -m755 build-tool/ciris-build-verify /usr/local/bin/ciris-build-verify
          ciris-build-sign --version
          # Show what dynamic libs the prebuilt links against — if
          # any libtss2 symbols are needed, this catches it before
          # we hit them at runtime. With the prebuilt being a
          # self-contained Rust binary, the only deps should be
          # libc + libdl + libpthread.
          ldd "$(command -v ciris-build-sign)" || true
      - name: emit PersistExtras JSON
        # Reads the source tree (migrations/ + cargo tree) and emits
        # the typed extras blob. Deterministic per checkout. Target
        # is set so dep_tree_sha256 reflects the linux-x86_64 build
        # closure — the target this manifest applies to.
        env:
          CIRIS_PERSIST_DEP_TARGET: x86_64-unknown-linux-gnu
        run: |
          mkdir -p dist
          cargo run --release --bin emit_persist_extras \
            > "dist/persist-extras-${{ steps.version.outputs.version }}.json"
          echo "PersistExtras emitted:"
          cat "dist/persist-extras-${{ steps.version.outputs.version }}.json"
      - name: download wheel for BuildManifest signing (linux x86_64)
        # The ciris-build-sign --binary input expects a single file
        # whose sha256 lands in BuildManifest.binary_hash. We sign
        # the linux-x86_64 wheel as the canonical reference; the
        # registry's binary-manifest POST below carries hashes for
        # all targets so multi-arch is provenance-covered.
        uses: actions/download-artifact@v4
        with:
          name: ciris_persist-wheel-linux-x86_64
          path: dist/wheel
      - name: download all multi-arch wheels for binary-manifest aggregation
        # v0.1.13 — registry's `binaries: HashMap<target, sha256>`
        # field carries every target persist publishes to PyPI.
        # We download all four artifacts into per-target subdirs
        # so the POST payload below can compute each hash.
        uses: actions/download-artifact@v4
        with:
          pattern: ciris_persist-wheel-*
          path: dist/wheels
          # `merge-multiple: false` so each artifact lands in its
          # own subdir matching the artifact name. With four wheels
          # named identically across matrix entries we'd otherwise
          # collide.
      - name: sign manifest with hybrid Ed25519 + ML-DSA-65
        env:
          # Bridge team uploads these as repo secrets (see
          # docs/BUILD_SIGNING.md). If either is missing the step
          # fails loudly — we don't fall back to unsigned at v1.8.0.
          CIRIS_BUILD_ED25519_SECRET: ${{ secrets.CIRIS_BUILD_ED25519_SECRET }}
          CIRIS_BUILD_MLDSA_SECRET: ${{ secrets.CIRIS_BUILD_MLDSA_SECRET }}
        run: |
          if [ -z "${CIRIS_BUILD_ED25519_SECRET}" ] || [ -z "${CIRIS_BUILD_MLDSA_SECRET}" ]; then
            echo "::error::Hybrid signing secrets not configured."
            echo "::error::Set CIRIS_BUILD_ED25519_SECRET and CIRIS_BUILD_MLDSA_SECRET."
            echo "::error::See docs/BUILD_SIGNING.md for ciris-build-sign generate-keys + secret upload."
            exit 1
          fi
          # Materialize the secret bytes to short-lived files. The
          # script-level set +x stays OFF so the secret never echoes
          # to logs (GH Actions auto-masks declared secrets, but
          # belt-and-suspenders here too).
          umask 077
          ED_KEY_PATH=$(mktemp)
          MLDSA_KEY_PATH=$(mktemp)
          # Secrets are stored base64-encoded; decode to raw bytes
          # for the CLI.
          printf '%s' "${CIRIS_BUILD_ED25519_SECRET}" | base64 -d > "$ED_KEY_PATH"
          printf '%s' "${CIRIS_BUILD_MLDSA_SECRET}" | base64 -d > "$MLDSA_KEY_PATH"
          BINARY="$(ls dist/wheel/*.whl | head -1)"
          ciris-build-sign sign \
            --primitive persist \
            --build-id "${{ steps.version.outputs.version }}" \
            --target x86_64-unknown-linux-gnu \
            --binary "$BINARY" \
            --binary-version "${{ steps.version.outputs.version }}" \
            --extras "dist/persist-extras-${{ steps.version.outputs.version }}.json" \
            --ed25519-seed "$ED_KEY_PATH" \
            --mldsa-secret "$MLDSA_KEY_PATH" \
            --key-id ciris-persist-build-v1 \
            --output "dist/ciris-persist-${{ steps.version.outputs.version }}.manifest.json"
          # Wipe key files immediately after signing.
          shred -uz "$ED_KEY_PATH" "$MLDSA_KEY_PATH" 2>/dev/null || rm -f "$ED_KEY_PATH" "$MLDSA_KEY_PATH"
          echo "Signed manifest:"
          cat "dist/ciris-persist-${{ steps.version.outputs.version }}.manifest.json"
      - name: pre-flight registry steward-key check
        # CIRISRegistry exposes GET /v1/steward-key with the active
        # signing key + key_id. We log it for human-visible
        # confirmation that the registry isn't running in ephemeral
        # mode. Per persist issue #2 / registry's own AV-28: an
        # ephemeral-key registry signs every manifest with a key
        # that disappears on registry restart, invalidating
        # downstream verify caches.
        #
        # We don't fail the build on ephemeral mode (registry might
        # be staging / dev intentionally); we surface it loudly so
        # the human running CI sees the posture before downstream
        # peers do.
        env:
          REGISTRY_URL: ${{ vars.REGISTRY_URL }}
        run: |
          if [ -z "${REGISTRY_URL}" ]; then
            REGISTRY_URL="https://api.registry.ciris-services-1.ai"
            echo "::warning::REGISTRY_URL repo variable unset; defaulting to ${REGISTRY_URL}"
          fi
          echo "Registry steward-key snapshot for ${REGISTRY_URL}:"
          curl -sf "${REGISTRY_URL}/v1/steward-key" | tee dist/steward-key.json | python3 -m json.tool
          # Surface key_id to the step summary so it's grep-able
          # later for cross-build cache-stability checks.
          KID=$(python3 -c 'import json; print(json.load(open("dist/steward-key.json"))["classical"]["key_id"])')
          echo "registry steward key_id=${KID}" >> "$GITHUB_STEP_SUMMARY"
      - name: register binary manifest with CIRISRegistry
        # POST the binary catalog to /v1/verify/binary-manifest with
        # project=ciris-persist (registry-side support shipped in
        # CIRISRegistry commit 254a89e, tracked under persist
        # issue #2). The registry signs server-side with its
        # steward key; we verify the round-trip in the next step.
        #
        # v0.1.13 — `binaries` carries hashes for all four PyPI
        # targets we publish (linux x86_64 + aarch64, darwin
        # arm64 + x86_64). Each target's wheel sha256 is stored
        # under its rust target-triple key, matching the convention
        # in PLATFORM_ARCHITECTURE.md §3.5.
        env:
          REGISTRY_URL: ${{ vars.REGISTRY_URL }}
          REGISTRY_ADMIN_TOKEN: ${{ secrets.REGISTRY_ADMIN_TOKEN }}
        run: |
          if [ -z "${REGISTRY_URL}" ]; then
            REGISTRY_URL="https://api.registry.ciris-services-1.ai"
          fi
          if [ -z "${REGISTRY_ADMIN_TOKEN}" ]; then
            echo "::error::REGISTRY_ADMIN_TOKEN repo secret not configured."
            echo "::error::Ask the bridge / registry team to issue + upload the persist build identity's admin token."
            echo "::error::See docs/BUILD_SIGNING.md (registry-registration section) for the wire shape."
            exit 1
          fi

          # Compute per-target sha256 hashes from each downloaded
          # wheel artifact. Maps the artifact-dir name to the
          # rust target triple the registry expects.
          declare -A TARGET_FOR=(
            ["ciris_persist-wheel-linux-x86_64"]="x86_64-unknown-linux-gnu"
            ["ciris_persist-wheel-linux-aarch64"]="aarch64-unknown-linux-gnu"
            ["ciris_persist-wheel-darwin-aarch64"]="aarch64-apple-darwin"
          )

          # Build a JSON object {target: "sha256:..."} aggregating
          # all targets the matrix produced. Missing wheels (e.g.
          # if a matrix entry failed) are omitted with a warning;
          # downstream consumers will still see hashes for the
          # successfully-built targets.
          BINARIES_JSON="{}"
          for ARTDIR in "${!TARGET_FOR[@]}"; do
            TARGET="${TARGET_FOR[$ARTDIR]}"
            WHEEL="$(ls dist/wheels/${ARTDIR}/*.whl 2>/dev/null | head -1)"
            if [ -z "${WHEEL}" ]; then
              echo "::warning::No wheel found for ${TARGET} (artifact ${ARTDIR}); skipping"
              continue
            fi
            SHA="sha256:$(sha256sum "${WHEEL}" | cut -d' ' -f1)"
            echo "  ${TARGET}: ${SHA} ($(basename ${WHEEL}))"
            BINARIES_JSON=$(python3 -c "
          import json, sys
          d = json.loads(sys.argv[1])
          d['${TARGET}'] = '${SHA}'
          print(json.dumps(d))
          " "${BINARIES_JSON}")
          done

          GENERATED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          PAYLOAD=$(python3 -c "
          import json, sys
          binaries = json.loads(sys.argv[1])
          print(json.dumps({
              'project': 'ciris-persist',
              'version': '${{ steps.version.outputs.version }}',
              'binaries': binaries,
              'generated_at': '${GENERATED_AT}',
              'notes': 'CIRIS federation persist substrate; manifest signed via ciris-build-sign --primitive persist (CIRISVerify v1.8.0). Multi-arch publish: linux x86_64 + aarch64, darwin arm64. (darwin x86_64 omitted — GH Actions Intel runner capacity issues; matches CIRISAgent matrix.)',
          }))
          " "${BINARIES_JSON}")
          echo "POST ${REGISTRY_URL}/v1/verify/binary-manifest"
          echo "Payload:"
          echo "${PAYLOAD}" | python3 -m json.tool
          HTTP_CODE=$(curl -sS -o dist/registry-response.json -w "%{http_code}" \
            -X POST "${REGISTRY_URL}/v1/verify/binary-manifest" \
            -H "Authorization: Bearer ${REGISTRY_ADMIN_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}")
          echo "HTTP ${HTTP_CODE}"
          cat dist/registry-response.json | python3 -m json.tool
          if [ "${HTTP_CODE}" != "200" ] && [ "${HTTP_CODE}" != "201" ]; then
            echo "::error::Registration failed with HTTP ${HTTP_CODE}"
            exit 1
          fi
          # Stash the binaries map for the round-trip step.
          echo "${BINARIES_JSON}" > dist/binaries-posted.json
      - name: round-trip verify GET /v1/builds/{version}
        # Persist issue #2 close gate: confirm the registered
        # manifest comes back via the public GET endpoint with
        # project=ciris-persist. v0.1.13 verifies ALL FOUR target
        # hashes (linux x86_64 + aarch64, darwin arm64 + x86_64)
        # round-trip cleanly; any single-target mismatch fails.
        env:
          REGISTRY_URL: ${{ vars.REGISTRY_URL }}
        run: |
          if [ -z "${REGISTRY_URL}" ]; then
            REGISTRY_URL="https://api.registry.ciris-services-1.ai"
          fi
          VERSION="${{ steps.version.outputs.version }}"
          echo "GET ${REGISTRY_URL}/v1/verify/binary-manifest/${VERSION}?project=ciris-persist"
          HTTP_CODE=$(curl -sS -o dist/round-trip.json -w "%{http_code}" \
            "${REGISTRY_URL}/v1/verify/binary-manifest/${VERSION}?project=ciris-persist")
          echo "HTTP ${HTTP_CODE}"
          cat dist/round-trip.json | python3 -m json.tool
          if [ "${HTTP_CODE}" != "200" ]; then
            echo "::error::Round-trip GET failed with HTTP ${HTTP_CODE} — registration didn't land or the public endpoint is rejecting project=ciris-persist"
            exit 1
          fi
          # Verify every target hash we POSTed comes back unchanged.
          # The binaries map saved at registration time is
          # authoritative; the GET response should match it
          # exactly.
          python3 <<'PY'
          import json, sys
          posted = json.load(open('dist/binaries-posted.json'))
          got_doc = json.load(open('dist/round-trip.json'))
          got = got_doc.get('binaries') or got_doc.get('manifest', {}).get('binaries') or {}
          mismatches = []
          for target, posted_sha in posted.items():
              got_sha = got.get(target, '<missing>')
              if got_sha != posted_sha:
                  mismatches.append(f"  {target}:\n    posted: {posted_sha}\n    got:    {got_sha}")
          if mismatches:
              print("::error::Round-trip hash mismatch on the following targets:")
              for m in mismatches:
                  print(m)
              sys.exit(1)
          print(f"✓ Round-trip verified: {len(posted)} target hashes match GET response:")
          for target, sha in posted.items():
              print(f"  {target}: {sha}")
          PY
          {
            echo "## Registry round-trip"
            echo ""
            echo "- registry: \`${REGISTRY_URL}\`"
            echo "- version: \`${VERSION}\`"
            echo "- targets:"
            python3 -c "
          import json
          for k, v in json.load(open('dist/binaries-posted.json')).items():
              print(f'  - \`{k}\`: \`{v}\`')
          "
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: ciris-persist-build-manifest-${{ steps.version.outputs.version }}
          path: |
            dist/persist-extras-*.json
            dist/ciris-persist-*.manifest.json
            dist/steward-key.json
            dist/registry-response.json
            dist/round-trip.json
            dist/binaries-posted.json
